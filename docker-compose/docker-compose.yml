version: '3'

services:
  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: tms
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  valkey:
    image: valkey/valkey:7-alpine
    container_name: dev-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    command: valkey-server --save 60 1 --loglevel warning

volumes:
  mysql-data:
  valkey-data: